<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission Registration Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #025644;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }
        input[type="text"], input[type="file"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="text"]:focus, select:focus {
            border-color: #025644;
            outline: none;
        }
        .btn-submit {
            background-color: #025644;
            color: #white;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #013d30;
        }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
            font-weight: 600;
            text-align: center;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Admission Form</h2>
    <form id="studentForm" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Student Full Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Aarav Hossain" required>
        </div>

        <div class="form-group">
            <label for="roll">Roll Number</label>
            <input type="text" id="roll" name="roll" placeholder="e.g. 12" required>
        </div>

        <div class="form-group">
            <label for="class">Class</label>
            <select id="class" name="class" required>
                <option value="">Select Class</option>
                <option value="Class VI">Class VI</option>
                <option value="Class VII">Class VII</option>
                <option value="Class VIII">Class VIII</option>
                <option value="Class IX">Class IX</option>
                <option value="Class X">Class X</option>
            </select>
        </div>

        <div class="form-group">
            <label for="section">Section</label>
            <input type="text" id="section" name="section" placeholder="e.g. A" value="A">
        </div>

        <div class="form-group">
            <label for="guardian">Guardian Name</label>
            <input type="text" id="guardian" name="guardian" placeholder="e.g. Rashid Hossain">
        </div>

        <div class="form-group">
            <label for="phone">Guardian Phone Number (Login credentials key)</label>
            <input type="text" id="phone" name="phone" placeholder="e.g. 01711223344" required>
        </div>

        <div class="form-group">
            <label for="photo">Student Photo</label>
            <input type="file" id="photo" name="photo" accept="image/*">
        </div>

        <button type="submit" class="btn-submit">Submit Registration</button>
    </form>

    <div id="msgBox" class="message"></div>
</div>

<script>
    document.getElementById('studentForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const msgBox = document.getElementById('msgBox');

        msgBox.style.display = 'none';

        fetch('insert.php', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            msgBox.style.display = 'block';
            if (data.status === 'success') {
                msgBox.className = 'message success';
                msgBox.innerText = data.message;
                document.getElementById('studentForm').reset();
            } else {
                msgBox.className = 'message error';
                msgBox.innerText = data.message;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            msgBox.style.display = 'block';
            msgBox.className = 'message error';
            msgBox.innerText = 'Failed to submit form. Please check network/server connection.';
        });
    });
</script>

</body>
</html>
